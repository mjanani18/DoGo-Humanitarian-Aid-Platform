<!DOCTYPE html>
<html>
<head>

    <title>NGO Login - DoGo</title>

    <link rel="stylesheet"
          href="{{ url_for('static', filename='style.css') }}">

    <style>

        body{
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #eef2f3, #dfe9f3);
        }

        /* MAIN WRAPPER */
        .login-wrapper{
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 88vh;
            padding: 20px;
        }

        /* LOGIN CARD */
        .login-card{
            width: 420px;
            background: rgba(255,255,255,0.7);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 35px;
            box-shadow: 0 8px 22px rgba(0,0,0,0.1);
            transition: 0.3s;
        }

        .login-card:hover{
            transform: translateY(-5px);
        }

        /* TITLE */
        .login-card h2{
            text-align: center;
            color: #1f2d3d;
            margin-bottom: 10px;
            font-size: 30px;
        }

        .subtitle{
            text-align: center;
            color: #666;
            margin-bottom: 30px;
            line-height: 1.6;
        }

        /* LABELS */
        label{
            font-weight: bold;
            color: #2c3e50;
            font-size: 14px;
        }

        /* INPUTS */
        input{
            width: 100%;
            padding: 12px;
            margin-top: 8px;
            margin-bottom: 18px;
            border-radius: 10px;
            border: 1px solid #ccc;
            box-sizing: border-box;
            font-size: 14px;
            transition: 0.3s;
        }

        input:focus{
            border-color: #0072ff;
            outline: none;
            box-shadow: 0 0 8px rgba(0,114,255,0.2);
        }

        /* BUTTON */
        button{
            width: 100%;
            padding: 13px;
            border: none;
            border-radius: 10px;
            background: linear-gradient(90deg, #0072ff, #0057cc);
            color: white;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover{
            transform: scale(1.02);
        }

        /* REGISTER LINK */
        .register-link{
            text-align: center;
            margin-top: 20px;
            font-size: 15px;
        }

        .register-link a{
            color: #0072ff;
            text-decoration: none;
            font-weight: bold;
        }

        .register-link a:hover{
            text-decoration: underline;
        }

        /* SUCCESS MESSAGE */
        .success-message{
            text-align: center;
            color: green;
            margin-top: 15px;
            font-weight: bold;
        }

    </style>

</head>

<body>

    <!-- NAVBAR -->
    <div class="navbar">

        <div class="logo-small">DO-GO</div>

        <div class="nav-links">

            <a href="/" class="nav-btn">Home</a>
            
        </div>

    </div>

    <!-- LOGIN AREA -->
    <div class="login-wrapper">

        <div class="login-card">

            <h2>NGO Login 🔐</h2>

            <div class="subtitle">

                Access your NGO dashboard securely using
                your registered NGO ID and password.

            </div>

            <form action="/ngo_login" method="POST">

                <label>NGO ID</label>
                <input type="text"
                       name="ngo_id"
                       placeholder="Enter NGO ID"
                       required>

                <label>Password</label>
                <input type="password"
                       name="password"
                       placeholder="Enter Password"
                       required>

                <button type="submit">
                    Login to Dashboard
                </button>

            </form>

            <div class="register-link">

                New NGO?
                <a href="/ngo_register">
                    Register here
                </a>

            </div>

            {% if message %}
                <p class="success-message">
                    {{ message }}
                </p>
            {% endif %}

        </div>

    </div>

</body>
</html>
