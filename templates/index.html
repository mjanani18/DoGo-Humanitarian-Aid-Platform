<!DOCTYPE html>
<html>

<head>

    <title>DoGo - Donate & Go</title>

    <link rel="stylesheet" href="/static/style.css">

    <style>

        body{
            font-family: "Segoe UI", Arial, sans-serif;
            text-align: center;
            background: linear-gradient(to right, #f5f7fa, #c3cfe2);
            margin: 0;
            padding-top: 100px;
        }

        .logo{
            font-size: 65px;
            font-weight: 900;
            letter-spacing: 6px;
            color: #1f2d3d;
        }

        .tagline{
            font-size: 22px;
            color: #444;
            margin-bottom: 50px;
        }

        .nav-buttons{
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            margin-top: 20px;
        }

        .btn{
            width: 170px;
            padding: 15px 30px;
            background: #0072ff;
            color: white;
            border-radius: 10px;
            text-decoration: none;
            font-size: 18px;
            transition: 0.3s;
            font-weight: bold;
            box-shadow: 0px 4px 10px rgba(0,0,0,0.15);
        }

        .btn:hover{
            background: #0056cc;
            transform: scale(1.05);
        }

        .footer{
            margin-top: 80px;
            color: #666;
            font-size: 14px;
        }

    </style>

</head>

<body>



    <div class="logo">
        DO-GO 💙
    </div>

    <div class="tagline">
        Donate & Go — Helping Hands, Better World
    </div>

    <div class="nav-buttons">

    <a href="/donate" class="btn">Donate Now</a>

    <a href="/track_search" class="btn">
    Track Donation
</a>


    <a href="/ngo_login" class="btn">NGO Login</a>

    <a href="/history" class="btn">Donation History</a>

    <a href="/behind_dogo" class="btn">Behind DoGo</a>

</div>
    <div class="footer">
        © 2026 DoGo Donation Platform
    </div>

</body>

</html>
